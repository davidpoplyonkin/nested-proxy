server {
    # Redirect all HTTP traffic to HTTPS
    listen 80;
    server_name .example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;

    # Dynamic server name to capture service and app names. Importantly,
    # subdomains (but not sub-subdomains) can be served from a single
    # wildcard SSL certificate.
    server_name ~^(?<service>.+)-(?<app>.+)\.example\.com$;

    # Required for dynamic proxy_pass in Docker
    resolver 127.0.0.11 valid=30s;

    # SSL certificate and key paths
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # Redirect to the container called <app>-nginx
    location / {
        proxy_pass http://${app}-nginx:80;

        # Information about the original sender
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
