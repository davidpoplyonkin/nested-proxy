services:
  app2-nginx:
    image: nginx:latest
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal
      - master-nginx-network

  service1:
    build: ./service1
    networks:
      - internal

  service2:
    build: ./service2
    networks:
      - internal
networks:
  internal:
  master-nginx-network:
    external: true
